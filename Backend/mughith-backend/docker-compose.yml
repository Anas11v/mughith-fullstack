version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mugeeth-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: mugeeth
      POSTGRES_PASSWORD: mugeeth123
      POSTGRES_DB: mugeeth_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
